name: MacRightClick CI/CD Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    name: Swift Tests + Stress Harness Sanity
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup macOS SDK and Toolchain
      run: |
        xcrun --show-sdk-path
        swift --version

    - name: Run Swift unit + stress tests (PendingAction lease/ack/reclaim, BackgroundActionRunner, InteractiveActionRunner, WatchScope, ...)
      run: |
        # SwiftPM tests cover the contract layer in isolation; the GUI App is not needed.
        # PendingActionStressTests in particular replays the same invariants the
        # python harness exercises end-to-end on a real machine.
        #
        # Note: tests share `SharedStorageManager.shared` and write to the same
        # ~/Library/Containers/<extBundle>/Data tree, so we run XCTest serially
        # (default) to avoid cross-test directory races. Each testCase still
        # cleans Pending/InFlight/Failed in setUp().
        swift test

    - name: Stress harness syntax sanity (no rot, no missing imports)
      run: |
        # We do NOT actually run the .py stress against a packaged .app on CI:
        # GitHub macos-latest runners are headless (no WindowServer) and the host
        # App relies on SwiftUI / NSStatusItem / NSPanel registration paths that
        # only behave correctly in a real GUI session. The python harness stays
        # as a real-machine regression tool; CI just verifies it parses cleanly
        # so that test/agent edits never silently break the harness.
        python3 -m py_compile Scripts/stress/run_stress.py
        python3 -m py_compile Scripts/stress/run_reclaim_stress.py

  build:
    name: Build Universal 2 App Bundle
    runs-on: macos-latest
    needs: test
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set executable permissions for scripts
      run: |
        chmod +x Scripts/build.sh
        chmod +x Scripts/uninstall.sh

    - name: Setup macOS SDK and Toolchain
      run: |
        xcrun --show-sdk-path
        swift --version

    - name: Compile and Pack using Build Script
      run: |
        ./Scripts/build.sh

    - name: Prepare Versioned and Latest Artifacts for Release
      run: |
        VERSION=$(cat VERSION | tr -d '\n' | tr -d '\r')
        echo "Detected version: $VERSION"
        cp build/RightClickAssistant.zip build/RightClickAssistant-v${VERSION}-macOS-Universal.zip
        cp build/RightClickAssistant.dmg build/RightClickAssistant-v${VERSION}-macOS-Universal.dmg
        cp build/RightClickAssistant.dmg build/RightClickAssistant-Latest.dmg

    - name: Upload Universal 2 App Bundle (Actions Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: MacRightClick-Universal2
        path: |
          build/RightClickAssistant-v*-macOS-Universal.zip
          build/RightClickAssistant-v*-macOS-Universal.dmg
          build/RightClickAssistant-Latest.dmg
        retention-days: 14

    - name: Create GitHub Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/RightClickAssistant-v*-macOS-Universal.zip
          build/RightClickAssistant-v*-macOS-Universal.dmg
          build/RightClickAssistant-Latest.dmg
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
