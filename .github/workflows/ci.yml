name: MacRightClick CI/CD Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Universal 2 App Bundle
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set executable permissions for scripts
      run: |
        chmod +x Scripts/build.sh
        chmod +x Scripts/uninstall.sh

    - name: Setup macOS SDK and Toolchain
      run: |
        xcrun --show-sdk-path
        swift --version

    - name: Compile and Pack using Build Script
      run: |
        ./Scripts/build.sh

    - name: Prepare Versioned and Latest Artifacts for Release
      run: |
        VERSION=$(cat VERSION | tr -d '\n' | tr -d '\r')
        echo "Detected version: $VERSION"
        cp build/RightClickAssistant.zip build/RightClickAssistant-v${VERSION}-macOS-Universal.zip
        cp build/RightClickAssistant.dmg build/RightClickAssistant-v${VERSION}-macOS-Universal.dmg
        cp build/RightClickAssistant.dmg build/RightClickAssistant-Latest.dmg

    - name: Upload Universal 2 App Bundle (Actions Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: MacRightClick-Universal2
        path: |
          build/RightClickAssistant-v*-macOS-Universal.zip
          build/RightClickAssistant-v*-macOS-Universal.dmg
          build/RightClickAssistant-Latest.dmg
        retention-days: 14

    - name: Create GitHub Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/RightClickAssistant-v*-macOS-Universal.zip
          build/RightClickAssistant-v*-macOS-Universal.dmg
          build/RightClickAssistant-Latest.dmg
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


